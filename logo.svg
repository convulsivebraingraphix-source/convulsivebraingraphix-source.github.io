<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="500" cy="500" r="450" fill="none" stroke="#4dd0e1" stroke-width="80"/>
  
  <!-- Top horizontal line with circles -->
  <line x1="150" y1="300" x2="850" y2="300" stroke="#E91E63" stroke-width="60" stroke-linecap="round"/>
  <circle cx="150" cy="300" r="45" fill="#E91E63"/>
  <circle cx="850" cy="300" r="45" fill="#E91E63"/>
  
  <!-- Center square -->
  <rect x="420" y="220" width="160" height="160" fill="none" stroke="#E91E63" stroke-width="60"/>
  
  <!-- Pen/Brush icon center -->
  <g transform="translate(500, 500)">
    <!-- Pen tip pentagon -->
    <polygon points="0,-80 70,-30 40,80 -40,80 -70,-30" fill="none" stroke="#008B9D" stroke-width="60" stroke-linejoin="round"/>
    
    <!-- Pen handle -->
    <rect x="-35" y="70" width="70" height="120" fill="none" stroke="#008B9D" stroke-width="60" stroke-linecap="round"/>
    
    <!-- Dot in pen -->
    <circle cx="0" cy="140" r="25" fill="#008B9D"/>
  </g>
  
  <!-- Bottom corners - squares -->
  <rect x="120" y="650" width="150" height="150" fill="none" stroke="#E91E63" stroke-width="60"/>
  <rect x="730" y="650" width="150" height="150" fill="none" stroke="#E91E63" stroke-width="60"/>
  
  <!-- Connecting curves -->
  <path d="M 150 450 Q 150 600 195 650" fill="none" stroke="#4dd0e1" stroke-width="80" stroke-linecap="round"/>
  <path d="M 850 450 Q 850 600 805 650" fill="none" stroke="#4dd0e1" stroke-width="80" stroke-linecap="round"/>
</svg>